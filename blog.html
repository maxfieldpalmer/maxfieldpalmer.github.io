<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Maxfield Palmer — Blog / News</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">Maxfield Palmer</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar"
              aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNavbar">
        <ul id="nav-menus" class="navbar-nav ms-auto"></ul>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <div class="row">
      <div class="col-lg-8">
        <h1 class="mb-3">Blog / News</h1>

        <!-- Search -->
        <div class="mb-3">
          <input id="search-input" class="form-control" placeholder="Search blog posts (title or content)..." />
        </div>

        <!-- active filter -->
        <div id="active-filters" class="mb-3"></div>

        <!-- posts list -->
        <div id="posts-list"></div>

        <div id="no-posts" class="alert alert-secondary" style="display:none;">No posts yet.</div>
      </div>

      <aside class="col-lg-4">
        <div class="card mb-3">
          <div class="card-body">
            <h6>About this blog</h6>
            <p class="small text-muted">This site is published by pull requests to the repo; only the repo maintainers can merge and publish posts.</p>
          </div>
        </div>
      </aside>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/site.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initNav();
      BlogApp.init({ source: '/posts.json' }); // fetch posts.json generated by GitHub Action
    });
  </script>
</body>
</html>

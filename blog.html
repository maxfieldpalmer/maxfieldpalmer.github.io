<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog</title>

  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet"
  />
</head>

<body>
  <!-- navigation bar -->
  <div id="navbar" class="topnav">
    <div class="nav-top">
      <a href="index.html" class="nav-brand">Maxfield Palmer</a>

      <button class="hamburger" id="hamburger" aria-label="Toggle navigation" aria-expanded="false">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>
    </div>

    <div class="nav-links-container" id="mobile-nav">
      <a href="index.html" class="nav-links">Home</a>
      <a href="blog.html" class="nav-links active">Blog</a>
      <a href="#" class="nav-links">News</a>
      <a href="contact.html" class="nav-links">Contact</a>
      <a href="#" class="nav-links">About</a>
    </div>
</div>

  <!-- HERO -->
  <div id="bg-fade" class="bg-img" style="background-image: url('../assets/img/bermuda.jpeg');">
    <h1 class="blog-title">Blog</h1>
    <div class="blog-search">
      <div class="controls">
        <div class="search-wrap">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input type="search" id="search" placeholder="Search posts…" autocomplete="on" />
        </div>

        <div class="tag-filters" id="tag-filters"></div>
      </div>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="main-content index-title">
    <hr class="divider" />
    <div class="result-count" id="result-count"></div>
    <div class="post-grid" id="post-grid"></div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true">
      <div class="modal" id="modal">
        <img class="modal-hero" id="modal-img" src="" alt=""/>
        <button class="modal-close" id="modal-close" aria-label="Close post">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
        <div class="modal-body">
          <div class="modal-meta" id="modal-meta"></div>
          <h1 id="modal-title"></h1>
          <div class="modal-content" id="modal-content"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- SCRIPTS -->
  <script src="scripts/blog.js"></script>
  <script src="scripts/blog_page.js"></script>
<script src="scripts/page.js"></script>

</body>
<footer class="footer_blog">
  <small style="width: 100%;">Copyright © Maxfield Palmer, 2026</small>
  <small>
  <a class ="footer-nav" href="mailto:max.palmer54@gmail.com">Send me an email</a>
    </small>
</footer>
</html>

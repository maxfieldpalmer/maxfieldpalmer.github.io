name: build-posts.json

on:
  push:
    paths:
      - '_posts/**'
      - 'scripts/**'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: write   # allow push from workflow (needed for committing files)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Show repo tree (debug)
        run: |
          echo "PWD: $(pwd)"
          echo "Top-level files:"
          ls -la
          echo "Recursive tree (top 4 levels):"
          find . -maxdepth 4 -print | sed -n '1,200p'

      - name: Locate package.json (and set WORKDIR)
        id: findpkg
        run: |
          pkgpath=$(find . -name package.json -type f -print -quit || true)
          if [ -z "$pkgpath" ]; then
            echo "no_package_json=true" >> $GITHUB_OUTPUT
            echo "No package.json found in repository. Exiting."
            exit 1
          fi
          pkgdir=$(dirname "$pkgpath")
          echo "package_json_path=$pkgpath" >> $GITHUB_OUTPUT
          echo "workdir=$pkgdir" >> $GITHUB_OUTPUT
          echo "Found package.json at: $pkgpath"
      - name: Show detected package.json info
        run: |
          echo "package_json_path: ${{ steps.findpkg.outputs.package_json_path }}"
          echo "workdir: ${{ steps.findpkg.outputs.workdir }}"
          echo "Listing workdir contents:"
          ls -la "${{ steps.findpkg.outputs.workdir }}"

      - name: Ensure package-lock.json (generate if missing)
        working-directory: ${{ steps.findpkg.outputs.workdir }}
        run: |
          if [ -f package-lock.json ]; then
            echo "package-lock.json already exists"
          else
            echo "Generating package-lock.json (npm install --package-lock-only)"
            npm install --package-lock-only
            echo "Generated lockfile:"
            ls -la package-lock.json || true
          fi

      - name: Commit package-lock.json (if changed)
        working-directory: ${{ steps.findpkg.outputs.workdir }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package-lock.json || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: add/update package-lock.json (CI generated)" || true
            git push origin HEAD || echo "push failed (check branch protection / permissions)"
          else
            echo "No lockfile changes to commit"
          fi

      - name: Install dependencies (deterministic)
        working-directory: ${{ steps.findpkg.outputs.workdir }}
        run: npm ci

      - name: build-posts.json
        working-directory: ${{ steps.findpkg.outputs.workdir }}
        run: npm run build-posts

      - name: Show generated posts.json
        run: |
          echo "posts.json top-level:"
          if [ -f posts.json ]; then
            head -n 50 posts.json || true
          else
            echo "No posts.json at repo root; try looking in working dir:"
            ls -la "${{ steps.findpkg.outputs.workdir }}" || true
          fi

      - name: Commit posts.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts.json || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: rebuild posts.json"
            git push origin HEAD || echo "push failed (check branch protection / permissions)"
          else
            echo "No changes to posts.json"
          fi

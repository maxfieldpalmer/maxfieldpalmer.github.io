name: build_posts.json

on:
  push:
    branches:
      - main
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  build:
    if: github.event_name != 'pull_request' || (github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Find package.json and install deps + build
        # This step finds package.json, cd's into its folder, installs deps (preferring npm ci when lockfile exists),
        # runs the build, then prints a result. If no package.json is found it prints the tree for debugging and exits non-zero.
        run: |
          set -euo pipefail

          # Search for package.json (limit depth to 3 to avoid long scans — increase if needed)
          PKG_PATH=$(find . -maxdepth 3 -type f -name package.json | head -n 1 || true)

          if [ -z "$PKG_PATH" ]; then
            echo "ERROR: No package.json found in the repository (searched depth 3)."
            echo "Repository tree (top 3 levels):"
            ls -la
            echo "-----"
            find . -maxdepth 3 -type d -print -exec ls -la {} \; || true
            exit 1
          fi

          PKG_DIR=$(dirname "$PKG_PATH")
          echo "Found package.json at: $PKG_PATH"
          echo "Switching to directory: $PKG_DIR"
          cd "$PKG_DIR"

          # Prefer npm ci if a lockfile exists; otherwise npm install
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            echo "Lockfile found — running npm ci"
            npm ci
          else
            echo "No lockfile — running npm install"
            npm install
          fi

          echo "Running build script: npm run build-posts"
          npm run build-posts

          # Return to workspace root so git operations run against the repo root
          cd "$GITHUB_WORKSPACE"

          # Find the generated posts.json (search up to depth 4)
          POST_JSON_PATH=$(find . -maxdepth 4 -type f -name posts.json | head -n 1 || true)
          if [ -n "$POST_JSON_PATH" ]; then
            echo "Built posts.json at: $POST_JSON_PATH"
          else
            echo "Warning: posts.json was not produced (searched depth 4)."
            echo "You may need to adjust the find depth or verify your build script writes posts.json."
          fi

      - name: Commit posts.json if changed
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # If posts.json is present somewhere, add that file path; otherwise nothing to add.
          POST_JSON_PATH=$(find . -maxdepth 4 -type f -name posts.json | head -n 1 || true)
          if [ -n "$POST_JSON_PATH" ]; then
            echo "Adding $POST_JSON_PATH to git"
            git add "$POST_JSON_PATH" || true
          else
            echo "No posts.json found to commit."
          fi

          if ! git diff --cached --quiet; then
            git commit -m "Build: update posts.json [skip ci]" || true
            git push
          else
            echo "No changes to posts.json"
          fi
